app-id: org.kde.kjules
rename-icon: sc-apps-kjules
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: kjules
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.secrets
modules:
  - name: kjules
    buildsystem: cmake-ninja
    cleanup:
      - /include
      - /lib/cmake
    config-opts:
      - "-DQT_MAJOR_VERSION=6"
    sources:
      - type: dir
        path: .
