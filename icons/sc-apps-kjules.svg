<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <g transform="translate(64,64) scale(0.4) translate(-100,-100)">
    <!-- 0 degrees -->
    <path d="M 215 100 A 115 115 0 0 0 100 -15 L 100 20 A 80 80 0 0 1 180 100 Z" fill="#0000ff" />
    <!-- 90 degrees -->
    <path d="M 100 215 A 115 115 0 0 0 215 100 L 180 100 A 80 80 0 0 1 100 180 Z" fill="#dec837" />
    <!-- 180 degrees -->
    <path d="M -15 100 A 115 115 0 0 0 100 215 L 100 180 A 80 80 0 0 1 20 100 Z" fill="#0000ff" />
    <!-- 270 degrees -->
    <path d="M 100 -15 A 115 115 0 0 0 -15 100 L 20 100 A 80 80 0 0 1 100 20 Z" fill="#dec837" />

    <!-- Inner narrow bands 45 degrees rotated -->
    <g transform="rotate(45 100 100)">
      <path d="M 180 100 A 80 80 0 0 0 100 20 L 100 21 A 79 79 0 0 1 179 100 Z" fill="#0000ff" />
      <path d="M 100 180 A 80 80 0 0 0 180 100 L 179 100 A 79 79 0 0 1 100 179 Z" fill="#dec837" />
      <path d="M 20 100 A 80 80 0 0 0 100 180 L 100 179 A 79 79 0 0 1 21 100 Z" fill="#0000ff" />
      <path d="M 100 20 A 80 80 0 0 0 20 100 L 21 100 A 79 79 0 0 1 100 21 Z" fill="#dec837" />
    </g>

    <!-- Outer narrow bands -45 degrees rotated -->
    <g transform="rotate(-45 100 100)">
      <path d="M 215 100 A 115 115 0 0 0 100 -15 L 100 -16 A 116 116 0 0 1 216 100 Z" fill="#0000ff" />
      <path d="M 100 215 A 115 115 0 0 0 215 100 L 216 100 A 116 116 0 0 1 100 216 Z" fill="#dec837" />
      <path d="M -15 100 A 115 115 0 0 0 100 215 L 100 216 A 116 116 0 0 1 -16 100 Z" fill="#0000ff" />
      <path d="M 100 -15 A 115 115 0 0 0 -15 100 L -16 100 A 116 116 0 0 1 100 -16 Z" fill="#dec837" />
    </g>
  </g>
</svg>
