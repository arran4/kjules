name: Clang Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Run clang-format
      run: |
        find src -name "*.h" -o -name "*.cpp" | xargs clang-format --dry-run --Werror

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake extra-cmake-modules qtbase5-dev qttools5-dev \
        libkf5coreaddons-dev libkf5i18n-dev libkf5wallet-dev libkf5notifications-dev \
        libkf5xmlgui-dev libkf5config-dev libkf5widgetsaddons-dev libkf5auth-dev \
        libkf5codecs-dev libkf5configwidgets-dev libkf5itemviews-dev libkf5iconthemes-dev \
        clang-tidy

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy
      run: |
        # Run clang-tidy on source files
        # Excluding generated files if any
        run-clang-tidy -p build src
